<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive 3D gallery of student design projects — explore models in your browser.">
  <title>Student 3D Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: #050b1a;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    #gallery-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: block;
      z-index: 0;
    }

    /* ── Loading bar ── */
    #loading-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 3px;
      z-index: 50;
      background: rgba(255,255,255,0.1);
      transition: opacity 0.5s;
    }
    #loading-progress {
      height: 100%;
      width: 0%;
      background: #7c3aed;
      transition: width 0.3s ease;
    }

    /* ── UI overlay ── */
    #ui-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    #back-link {
      pointer-events: all;
      position: absolute;
      top: 18px; left: 18px;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 6px 14px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.02em;
      backdrop-filter: blur(8px);
      transition: background 0.2s, color 0.2s;
    }
    #back-link:hover {
      background: rgba(124,58,237,0.6);
      color: #fff;
    }

    #gallery-title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.9);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: rgba(0,0,0,0.5);
      padding: 6px 18px;
      border-radius: 20px;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      text-align: center;
      max-width: calc(100vw - 200px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #nav-hint {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 0.05em;
      background: rgba(0,0,0,0.4);
      padding: 5px 14px;
      border-radius: 12px;
      white-space: nowrap;
      backdrop-filter: blur(6px);
    }

    /* ── Inspect panel ── */
    #inspect-panel {
      pointer-events: all;
      position: absolute;
      top: 50%;
      right: 24px;
      transform: translateY(-50%) translateX(0);
      width: 280px;
      background: rgba(5,11,26,0.9);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 14px;
      padding: 24px 22px 20px;
      color: #fff;
      backdrop-filter: blur(16px);
      transition: opacity 0.25s, transform 0.25s;
    }
    #inspect-panel.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%) translateX(16px);
    }

    #inspect-close {
      position: absolute;
      top: 12px; right: 14px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    #inspect-close:hover {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    #inspect-name {
      margin: 0 0 6px;
      font-size: 17px;
      font-weight: 700;
      color: #c4b5fd;
      line-height: 1.3;
      padding-right: 20px;
    }
    #inspect-student {
      margin: 0 0 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-style: italic;
    }
    #inspect-desc {
      margin: 0;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
    }

    #inspect-label {
      display: block;
      margin-bottom: 14px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(124,58,237,0.8);
      font-weight: 600;
    }

    #inspect-audio {
      margin: 8px 0 0;
      font-size: 12px;
      color: #a78bfa;
    }
    #inspect-audio.hidden { display: none; }

    #photo-btn {
      pointer-events: all;
      position: absolute;
      bottom: 22px; left: 18px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, color 0.2s;
    }
    #photo-btn:hover {
      background: rgba(124,58,237,0.6);
      color: #fff;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <canvas id="gallery-canvas"></canvas>

  <div id="loading-bar">
    <div id="loading-progress"></div>
  </div>

  <div id="ui-overlay">
    <a href="/tools/" id="back-link">← Back to Tools</a>
    <div id="gallery-title">Student 3D Gallery</div>
    <div id="nav-hint">Click a model to inspect &nbsp;·&nbsp; Drag to orbit &nbsp;·&nbsp; Scroll to zoom</div>

    <div id="inspect-panel" class="hidden">
      <button id="inspect-close" aria-label="Close">×</button>
      <span id="inspect-label">Artwork</span>
      <h2 id="inspect-name"></h2>
      <p id="inspect-student"></p>
      <p id="inspect-desc"></p>
      <p id="inspect-audio" class="hidden"></p>
    </div>
    <button id="photo-btn" aria-label="Take photo">📸 Photo</button>
  </div>

  <script type="module" src="./gallery.js"></script>
</body>
</html>
