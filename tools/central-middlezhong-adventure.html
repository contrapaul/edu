<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENTRAL MIDDLEZHONG — A Design Adventure</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Press+Start+2P&display=swap');

  :root {
    --green: #00ff41;
    --green-dim: #00aa2a;
    --green-dark: #003310;
    --green-glow: rgba(0,255,65,0.15);
    --amber: #ffb000;
    --red: #ff3c3c;
    --blue: #00cfff;
    --bg: #030d03;
    --scanline: rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 999;
  }

  #container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 16px;
    max-width: 960px;
    margin: 0 auto;
    position: relative;
  }

  #header {
    text-align: center;
    padding: 10px 0 8px;
    border-bottom: 1px solid var(--green-dim);
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  #header h1 {
    font-family: 'VT323', monospace;
    font-size: 2.4em;
    color: var(--green);
    text-shadow: 0 0 10px var(--green), 0 0 20px var(--green-dim);
    letter-spacing: 4px;
    line-height: 1;
  }

  #header .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65em;
    color: var(--green-dim);
    letter-spacing: 3px;
    margin-top: 3px;
  }

  #status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px;
    border: 1px solid var(--green-dark);
    background: rgba(0,255,65,0.03);
    font-size: 0.7em;
    color: var(--green-dim);
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  #status-bar .location { color: var(--amber); }
  #status-bar .score { color: var(--blue); }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 10px 8px;
    border: 1px solid var(--green-dark);
    background: rgba(0,30,0,0.4);
    margin-bottom: 8px;
    scroll-behavior: smooth;
  }

  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: var(--bg); }
  #output::-webkit-scrollbar-thumb { background: var(--green-dark); }

  .line {
    font-size: 0.88em;
    line-height: 1.65;
    margin-bottom: 2px;
    animation: fadein 0.3s ease;
  }

  .line.narrator {
    color: var(--green);
  }

  .line.character {
    color: var(--amber);
  }

  .line.system {
    color: var(--blue);
    font-size: 0.78em;
  }

  .line.error {
    color: var(--red);
  }

  .line.success {
    color: #80ff80;
    text-shadow: 0 0 6px var(--green);
  }

  .line.hint {
    color: #aaffaa;
    font-size: 0.78em;
    padding-left: 12px;
    border-left: 2px solid var(--green-dark);
  }

  .line.big {
    font-family: 'VT323', monospace;
    font-size: 1.6em;
    color: var(--green);
    text-shadow: 0 0 12px var(--green);
    letter-spacing: 2px;
  }

  .line.fail {
    font-family: 'VT323', monospace;
    font-size: 1.4em;
    color: var(--red);
    text-shadow: 0 0 10px var(--red);
  }

  .line.divider {
    color: var(--green-dark);
    letter-spacing: 2px;
    margin: 6px 0;
  }

  .line.player {
    color: #fffde8;
    opacity: 0.7;
    font-size: 0.82em;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  #input-row {
    display: flex;
    align-items: center;
    border: 1px solid var(--green-dim);
    background: rgba(0,255,65,0.04);
    padding: 6px 10px;
    flex-shrink: 0;
  }

  #prompt-symbol {
    color: var(--green);
    font-size: 1em;
    margin-right: 8px;
    text-shadow: 0 0 8px var(--green);
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.88em;
    caret-color: var(--green);
    text-transform: lowercase;
  }

  #input::placeholder { color: var(--green-dark); }

  #footer {
    text-align: center;
    font-size: 0.6em;
    color: var(--green-dark);
    padding-top: 5px;
    flex-shrink: 0;
    letter-spacing: 2px;
  }

  .flicker {
    animation: flicker 0.15s ease 2;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.1; }
  }

  .cursor-blink::after {
    content: '█';
    animation: blink 1s step-end infinite;
    color: var(--green);
  }

  #title-art {
    font-family: 'VT323', monospace;
    font-size: 0.85em;
    color: var(--green-dim);
    text-align: center;
    line-height: 1.2;
    text-shadow: 0 0 6px var(--green-dark);
  }
</style>
</head>
<body>
<div id="container">
  <div id="header">
    <h1>CENTRAL MIDDLEZHONG</h1>
    <div class="subtitle">▸ AN IB DP DESIGN TECHNOLOGY ADVENTURE ◂</div>
  </div>

  <div id="status-bar">
    <span>IB DP DT — TOPIC B3.1: MATERIAL SELECTION</span>
    <span class="location" id="status-location">LOCATION: UNKNOWN</span>
    <span class="score" id="status-score">DECISIONS: 0</span>
  </div>

  <div id="output"></div>

  <div id="input-row">
    <span id="prompt-symbol">▸</span>
    <input id="input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type your response and press ENTER..." />
  </div>

  <div id="footer">TYPE  [hint]  OR  [/hint]  AT ANY TIME TO SEE AVAILABLE COMMANDS &nbsp;|&nbsp; IB DP DESIGN TECHNOLOGY — B3.1 MATERIAL SELECTION</div>
</div>

<script>
// ============================================================
//  CENTRAL MIDDLEZHONG — TEXT ADVENTURE ENGINE
//  IB DP Design Technology — Topic B3.1: Material Selection
// ============================================================

const out = document.getElementById('output');
const input = document.getElementById('input');
const statusLocation = document.getElementById('status-location');
const statusScore = document.getElementById('status-score');

let state = {};
let currentScene = null;
let decisionsCount = 0;
let currentHints = [];
let printQueue = [];
let isPrinting = false;

// ── Output Helpers ──────────────────────────────────────────

function print(text, cls = 'narrator', delay = 0) {
  return new Promise(resolve => {
    printQueue.push({ text, cls, delay, resolve });
    if (!isPrinting) processQueue();
  });
}

function processQueue() {
  if (printQueue.length === 0) { isPrinting = false; return; }
  isPrinting = true;
  const { text, cls, delay, resolve } = printQueue.shift();
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.textContent = text;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
    resolve();
    processQueue();
  }, delay);
}

async function printLines(lines, cls = 'narrator', baseDelay = 0, step = 30) {
  for (let i = 0; i < lines.length; i++) {
    await print(lines[i], cls, i === 0 ? baseDelay : step);
  }
}

function printDivider() {
  print('─────────────────────────────────────────────────────', 'divider', 20);
}

function printBlank() {
  print('', 'divider', 10);
}

function setLocation(loc) {
  statusLocation.textContent = 'LOCATION: ' + loc.toUpperCase();
}

function incrementDecisions() {
  decisionsCount++;
  statusScore.textContent = 'DECISIONS: ' + decisionsCount;
}

function setHints(hints) {
  currentHints = hints;
}

function normalize(str) {
  return str.toLowerCase().trim().replace(/[^a-z0-9 ]/g, '');
}

function showHints() {
  if (currentHints.length === 0) {
    print('[ No hints available right now. ]', 'hint', 0);
    return;
  }
  print('[ HINT — You can type any of the following: ]', 'hint', 0);
  currentHints.forEach(h => print('  ▸ ' + h, 'hint', 20));
  printBlank();
}

// ── Input Handler ───────────────────────────────────────────

input.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const val = input.value.trim();
    if (!val) return;
    const norm = normalize(val);
    input.value = '';
    print('▸ ' + val, 'player', 0);
    if (norm === 'hint' || norm === '/hint') {
      showHints();
      return;
    }
    if (currentScene) {
      incrementDecisions();
      await currentScene(norm);
    }
  }
});

// ── Scene Registry ──────────────────────────────────────────

async function goTo(sceneFn) {
  currentScene = null;
  printBlank();
  await sceneFn();
}

// ============================================================
//  TITLE & INTRO
// ============================================================

async function sceneTitleScreen() {
  setLocation('BOOT SCREEN');
  await printLines([
    '╔═══════════════════════════════════════════════════════╗',
    '║                                                       ║',
    '║        C E N T R A L   M I D D L E Z H O N G         ║',
    '║                                                       ║',
    '║           A Design Technology Adventure               ║',
    '║                                                       ║',
    '╚═══════════════════════════════════════════════════════╝',
  ], 'big', 0, 25);
  await printLines([
    '',
    'You have just arrived in Central MiddleZhong — a growing',
    'town where old infrastructure is giving way to ambitious',
    'new construction projects.',
    '',
    'You are a newly qualified designer / engineer, fresh out',
    'of school, looking for your first real commission.',
    '',
    'The town needs you. But it needs the RIGHT materials too.',
    '',
  ], 'narrator', 100, 35);
  print('Type your name to begin, or type  start  to use a default name.', 'system', 40);
  setHints(['[your name]', 'start']);
  currentScene = async (inp) => {
    let name = inp === 'start' ? 'Designer' : inp.charAt(0).toUpperCase() + inp.slice(1);
    state.playerName = name;
    await goTo(() => sceneIntro(name));
  };
}

async function sceneIntro(name) {
  setLocation('CENTRAL STATION');
  await printLines([
    `Welcome, ${name}.`,
    '',
    'You step off the train at Central MiddleZhong Station.',
    'The air smells of concrete dust and possibility.',
    'A noticeboard on the platform lists three active tenders:',
    '',
    '  [1] BRIDGE — A new footbridge over the River Zhong.',
    '  [2] PLAYGROUND — A children\'s play area, Riverside Park.',
    '  [3] CLIMBING — Indoor rock climbing centre, North Quarter.',
    '',
    'Each project will test your material selection skills.',
    'Choose wisely — budget is tight, and the town is watching.',
    '',
    'Which project do you want to apply for?',
    '(type  bridge, playground,  or  climbing)',
  ], 'narrator', 0, 30);
  setHints(['bridge', 'playground', 'climbing']);
  currentScene = async (inp) => {
    if (inp === 'bridge') { state.project = 'bridge'; await goTo(sceneBridgeStart); }
    else if (inp === 'playground' || inp === 'play') { state.project = 'playground'; await goTo(scenePlaygroundStart); }
    else if (inp === 'climbing' || inp === 'climb') { state.project = 'climbing'; await goTo(sceneClimbingStart); }
    else {
      print('The noticeboard only lists those three options. Try again.', 'error', 0);
      print('Type  bridge,  playground,  or  climbing.', 'system', 20);
    }
  };
}

// ============================================================
//  PATH 1 — THE BRIDGE
// ============================================================

async function sceneBridgeStart() {
  setLocation('CIVIC OFFICES');
  await printLines([
    '════════════════════════════════════════════════════════',
    ' PROJECT 1: THE ZHONG FOOTBRIDGE',
    '════════════════════════════════════════════════════════',
    '',
    'You walk to the Civic Offices and meet MAYOR CHEN.',
    '',
  ], 'narrator', 0, 25);
  await printLines([
    '"Ah, you made it! The old bridge washed away in last',
    'autumn\'s floods. We need a new pedestrian footbridge',
    'over the River Zhong — roughly 18 metres span.',
    'It must handle heavy foot traffic and last 30+ years.',
    'The environment is tough: damp, prone to flooding,',
    'and we get cold winters."',
    '',
    '"I\'ll be honest — the council budget is limited.',
    'We\'re hoping for a practical solution, not a monument.',
    'Tell me — what would you use for the main structure?"',
  ], 'character', 50, 30);
  printBlank();
  print('What material do you propose for the main bridge structure?', 'system', 40);
  setHints(['steel', 'reinforced concrete', 'timber', 'aluminium', 'composite']);
  currentScene = (inp) => sceneBridge_StructureMaterial(inp);
}

async function sceneBridge_StructureMaterial(inp) {
  if (inp.includes('steel') || inp.includes('structural steel')) {
    state.bridgeStructure = 'steel';
    await printLines([
      '',
      'Mayor Chen nods slowly.',
      '"Steel. Sensible choice. High strength-to-weight ratio,',
      'predictable behaviour under load, well-understood by',
      'local contractors."',
      '',
      'You remind her: structural steel has a tensile strength',
      'of ~400-500 MPa — ideal for spanning 18 metres.',
      'Prefabricated sections can be fabricated off-site.',
      '',
      '"But," she says, tapping her clipboard, "the river',
      'environment means corrosion is a real concern.',
      'What will you do about that?"',
    ], 'character', 0, 28);
    setHints(['galvanise', 'paint', 'weathering steel', 'stainless steel', 'coating']);
    currentScene = (inp) => sceneBridge_Corrosion(inp);

  } else if (inp.includes('concrete') || inp.includes('reinforced concrete') || inp.includes('rc')) {
    state.bridgeStructure = 'concrete';
    await printLines([
      '',
      '"Reinforced concrete," the Mayor repeats slowly.',
      '"It\'s been used on the old road bridge upstream.',
      'Heavy, but durable. You know, concrete is strong',
      'in compression but weak in tension — that\'s why',
      'steel rebar is embedded inside."',
      '',
      '"For an 18-metre pedestrian span, you\'d need significant',
      'formwork and site work. It\'ll take longer and cost more',
      'to build than a prefab steel solution. The council',
      'budget is tight. Can you justify the extra cost?"',
    ], 'character', 0, 28);
    print('Can you justify reinforced concrete for this short span?', 'system', 40);
    setHints(['yes it is durable', 'no i will use steel instead', 'it resists flooding well']);
    currentScene = async (inp) => {
      if (inp.includes('no') || inp.includes('steel')) {
        print('You reconsider. "Actually, steel would be more appropriate here."', 'narrator', 0);
        state.bridgeStructure = 'steel';
        await print('"Good thinking," says Mayor Chen. "Steel it is."', 'character', 30);
        print('What will you do about corrosion in the river environment?', 'system', 50);
        setHints(['galvanise', 'paint', 'weathering steel', 'coating']);
        currentScene = (inp) => sceneBridge_Corrosion(inp);
      } else {
        await printLines([
          '"Alright," the Mayor sighs. "But the council will push back',
          'on cost overruns. For a simple pedestrian bridge this short,',
          'prefabricated steel sections would be faster and cheaper.',
          'You\'ve forced a compromise: we can only afford a narrower',
          'deck. Hope no one brings their bicycle."',
          '',
          'Lesson noted: matching material choice to structural',
          'requirements AND budget is essential.',
        ], 'character', 0, 28);
        state.bridgeStructure = 'concrete';
        print('The Mayor moves on. What surface will you use for the deck?', 'system', 40);
        setHints(['timber decking', 'steel grating', 'concrete', 'composite decking']);
        currentScene = (inp) => sceneBridge_Deck(inp);
      }
    };

  } else if (inp.includes('timber') || inp.includes('wood')) {
    await printLines([
      '',
      'The Mayor raises an eyebrow.',
      '"Timber? For the main structure of an 18-metre river',
      'bridge? I appreciate the thought — timber IS strong',
      'along the grain. But in a damp, flood-prone river',
      'environment, untreated timber will rot within years.',
      'Even treated structural timber struggles long-term',
      'in standing water. And we need 30+ years of service."',
      '',
      '"Consider: timber is great for bridge decking,',
      'handrails, or covered walkways — but for the main',
      'load-bearing structure here, you need something that',
      'handles wet conditions better. Want to reconsider?"',
    ], 'character', 0, 28);
    print('[ HINT: Think about corrosion/decay resistance and structural strength ]', 'hint', 20);
    print('What do you propose instead?', 'system', 30);
    setHints(['steel', 'reinforced concrete', 'composite']);
    currentScene = (inp) => sceneBridge_StructureMaterial(inp);

  } else if (inp.includes('aluminium') || inp.includes('aluminum')) {
    await printLines([
      '',
      '"Aluminium!" The Mayor looks intrigued.',
      '"Lightweight, naturally corrosion-resistant — aluminium',
      'forms a protective oxide layer, which is useful here.',
      'However... aluminium is significantly more expensive',
      'than structural steel, and has a lower elastic modulus',
      '— it deflects more under load. For this span, you\'d',
      'need a deeper beam section to control deflection.",',
      '"The council won\'t approve the cost premium.',
      'Aluminium bridges are used — but typically for',
      'specialist applications where weight is critical.',
      'For a simple town footbridge: too expensive.',
      'Try again."',
    ], 'character', 0, 28);
    setHints(['steel', 'reinforced concrete']);
    currentScene = (inp) => sceneBridge_StructureMaterial(inp);

  } else {
    print('Mayor Chen looks puzzled. "Is that a material you\'d use for a bridge?"', 'character', 0);
    print('Type  hint  to see what materials to consider.', 'system', 20);
  }
}

async function sceneBridge_Corrosion(inp) {
  let handled = false;
  if (inp.includes('galvanis') || inp.includes('galvanize') || inp.includes('zinc')) {
    state.bridgeCorrosion = 'galvanised';
    await printLines([
      '',
      '"Hot-dip galvanising! Excellent," the Mayor says.',
      '"You\'re coating the steel in zinc — and zinc is',
      'sacrificial: it corrodes preferentially, protecting',
      'the steel beneath. Industry-standard for outdoor',
      'structural steelwork. Cost-effective. Smart."',
      '',
      'MATERIAL NOTE: Galvanised steel lasts 20-50 years',
      'in most outdoor environments before maintenance.',
    ], 'character', 0, 28);
    handled = true;
  } else if (inp.includes('paint') || inp.includes('painted') || inp.includes('coating') || inp.includes('epoxy')) {
    state.bridgeCorrosion = 'painted';
    await printLines([
      '',
      '"Paint coatings work," the Mayor says, "but they',
      'need regular maintenance — repainting every 5-10 years.',
      'In the long run, galvanising or weathering steel',
      'reduces lifetime maintenance costs. We\'ll accept it,',
      'but factor in the maintenance budget."',
      '',
      'MATERIAL NOTE: Protective coatings are valid but',
      'require ongoing maintenance cycles.',
    ], 'character', 0, 28);
    handled = true;
  } else if (inp.includes('weathering') || inp.includes('cor-ten') || inp.includes('corten')) {
    state.bridgeCorrosion = 'weathering steel';
    await printLines([
      '',
      '"Weathering steel — also called Cor-Ten!" the Mayor',
      'says with real interest. "It forms a stable rust-like',
      'patina that actually protects the steel beneath.',
      'Zero painting needed. Architects love the aesthetic."',
      '',
      '"One caution: it needs good drainage — standing water',
      'can cause it to corrode through. With proper detailing,',
      'it\'s an excellent long-term choice. Well done."',
      '',
      'MATERIAL NOTE: Weathering steel — highest long-term',
      'value where drainage is well-managed.',
    ], 'character', 0, 28);
    handled = true;
  } else if (inp.includes('stainless')) {
    await printLines([
      '"Stainless steel! Technically excellent — the chromium',
      'oxide layer makes it highly corrosion resistant.',
      'But stainless structural sections cost 4-6x more than',
      'mild steel. The council will never approve that budget.',
      'Good thinking, but impractical here. Try a more',
      'cost-effective corrosion treatment."',
    ], 'character', 0, 28);
    setHints(['galvanise', 'paint', 'weathering steel']);
    return;
  } else {
    print('"That doesn\'t sound like a corrosion treatment to me."', 'character', 0);
    print('Type  hint  for ideas.', 'system', 20);
    return;
  }

  if (handled) {
    printBlank();
    print('The Mayor moves on. What will you use for the bridge deck surface?', 'system', 40);
    setHints(['timber decking', 'steel grating', 'composite decking', 'concrete']);
    currentScene = (inp) => sceneBridge_Deck(inp);
  }
}

async function sceneBridge_Deck(inp) {
  let feedback = '';
  let good = false;

  if (inp.includes('timber') || inp.includes('hardwood') || inp.includes('wood')) {
    good = true;
    feedback = [
      '"Hardwood timber decking — classic choice for footbridges.',
      'It\'s warm underfoot, has a natural grip when wet if',
      'grooved correctly, and looks welcoming.',
      'You\'d specify sustainably sourced hardwood — a material',
      'property worth noting: hardwoods are denser and more',
      'durable than softwoods for external use.',
      'Ensure end-grain sealing to slow moisture uptake."',
    ];
  } else if (inp.includes('composite') || inp.includes('wpc') || inp.includes('recycled plastic')) {
    good = true;
    feedback = [
      '"Composite decking — wood-plastic composite (WPC).',
      'Excellent choice. It won\'t rot, splinter, or require',
      'painting, and many products use recycled materials.',
      'Slightly higher upfront cost than timber, but lower',
      'lifetime maintenance. Very suitable for river use."',
    ];
  } else if (inp.includes('grating') || inp.includes('steel grating') || inp.includes('open grating')) {
    good = true;
    feedback = [
      '"Steel grating. Practical — allows leaves and water',
      'to fall through, prevents slip build-up.',
      'Some pedestrians find open grating unsettling',
      '(especially with young children) but it\'s cost-effective',
      'and widely used on utility footbridges. Accepted."',
    ];
  } else if (inp.includes('concrete')) {
    good = false;
    feedback = [
      '"Concrete decking adds significant dead load to the',
      'bridge structure. For a pedestrian footbridge we want',
      'to minimise self-weight. It would work on a road bridge,',
      'but here it\'s overspecified and adds unnecessary cost.',
      'Consider a lighter decking material."',
    ];
    setHints(['timber decking', 'composite decking', 'steel grating']);
    await printLines(feedback, 'character', 0, 28);
    return;
  } else {
    print('"Hmm. That\'s not a standard decking material for a bridge."', 'character', 0);
    print('Type  hint  for ideas.', 'system', 20);
    return;
  }

  await printLines(feedback, 'character', 0, 28);
  await goTo(sceneBridge_Budget);
}

async function sceneBridge_Budget() {
  setLocation('CIVIC OFFICES — BUDGET MEETING');
  await printLines([
    '',
    'Three days later. Budget meeting.',
    '',
    'COUNCILLOR ZHANG slides a spreadsheet across the table.',
    '',
    '"Your material estimates have come in 22% over budget.',

async function sceneClimbing_Floor(inp) {
  if (inp.includes('foam') || inp.includes('crash mat') || inp.includes('mat') || inp.includes('bouldering mat') || inp.includes('pad')) {
    state.climbFloor = 'foam crash mats';
    await printLines([
      '',
      '"Foam crash mat system. Correct," Mei confirms.',
      '"Industry standard: a layered foam system —",',
      '"  • Top layer: open-cell foam for initial impact",',
      '"  • Base layer: denser closed-cell foam for energy",',
      '"    absorption and to prevent bottoming out",',
      '"  • PVC or Cordura cover — durable, cleanable"',
      '',
      '"Total depth typically 300-400mm for bouldering.",',
      '"The foam is a sacrificial material — it will need',
      'replacing every 5-8 years as it compresses.",',
      '"Budget for replacement in your whole-life cost."',
    ], 'character', 0, 28);

  } else if (inp.includes('rubber') || inp.includes('rubber floor') || inp.includes('gym floor')) {
    await printLines([
      '"Rubber gym flooring alone is not sufficient for',
      'bouldering. It provides grip and some shock absorption,',
      'but not enough energy absorption for falls from 4.5m.",',
      '"You\'d need dedicated bouldering crash mat systems.',
      'Rubber flooring is appropriate in the walking areas."',
    ], 'character', 0, 28);
    setHints(['foam crash mats', 'foam', 'layered foam mats']);
    return;

  } else if (inp.includes('sand') || inp.includes('gravel') || inp.includes('sawdust')) {
    await printLines([
      '',
      '⚠ SERIOUS CONCERN',
      '',
      '"Sand or loose fill under a bouldering wall?"',
      '"This was used in very early climbing gyms and',
      'proved dangerous — loose fill compacts unevenly,',

      'with certified impact attenuation performance.',
      'Do not use loose fill for bouldering floors."',
    ], 'fail', 0, 25);
    setHints(['foam crash mats', 'foam pads']);
    return;

  } else if (inp.includes('concrete') || inp.includes('hard') || inp.includes('wood')) {
    await printLines([
      '',
      '⚠ FAILURE — UNACCEPTABLE FALL ZONE SURFACE',
      '',
      '"A hard surface under bouldering?" Mei is horrified.',

      'or death. This absolutely cannot be approved.",',
      '',
      'SAFETY CRITICAL: Fall zones beneath climbing require',
      'engineered impact-absorbing surfaces. No exceptions.',
    ], 'fail', 0, 25);
    setHints(['foam crash mats', 'foam pads']);
    return;

  } else {
    print('"What would protect a falling climber? Think about energy absorption."', 'character', 0);
    print('Type  hint  for ideas.', 'system', 20);
    return;
  }

  printBlank();
  await goTo(sceneClimbing_Structure);
}
