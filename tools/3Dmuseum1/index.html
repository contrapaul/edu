<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museum of Mr. K's Technology</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
canvas { display: block; }

#blocker {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 10; cursor: pointer; user-select: none;
}
#blocker .content { text-align: center; color: #fff; padding: 20px; }
#blocker h1 { font-size: 42px; margin-bottom: 16px; font-weight: 300; letter-spacing: 2px; }
#blocker p { font-size: 18px; opacity: 0.8; }
#blocker .sub { font-size: 13px; opacity: 0.45; margin-top: 10px; }

#ui {
  position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
  z-index: 5; text-align: center; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
#prompt {
  background: rgba(0,0,0,0.75); color: #fff; padding: 10px 28px;
  border-radius: 8px; font-size: 15px; letter-spacing: 0.5px;
  opacity: 0; transition: opacity 0.25s; border: 1px solid rgba(255,255,255,0.1);
}
#prompt.visible { opacity: 1; }
#playing {
  background: rgba(0,0,0,0.65); color: #66ff99; padding: 8px 22px;
  border-radius: 20px; font-size: 13px; letter-spacing: 0.3px;
  opacity: 0; transition: opacity 0.25s; border: 1px solid rgba(102,255,153,0.2);
}
#playing.visible { opacity: 1; }

#debug {
  position: fixed; bottom: 10px; left: 12px;
  color: rgba(255,255,255,0.2); font-size: 11px; font-family: monospace;
  z-index: 2; pointer-events: none; text-shadow: 0 0 4px rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<div id="blocker">
  <div class="content">
    <h1>✦ Museum of Mr. K's Technology ✦</h1>
    <p>Click to explore</p>
    <p class="sub">WASD to walk · Mouse to look · Press <b>E</b> near artifacts for audio · <b>P</b> to log position</p>
  </div>
</div>

<div id="ui">
  <div id="prompt"></div>
  <div id="playing"></div>
</div>

<div id="debug"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
  }
}
</script>

<script type="module">
// ============================================================
// Museum of Mr. K's Technology — Three.js First-Person Gallery
// ============================================================
// Threepipe Editor notes:
//   All objects are named consistently (artifact_1, pedestal_1,
//   zone_hardware, wall_north_1, etc.) so you can import this
//   scene into Threepipe Editor and reposition objects visually.
//   To export: open in Threepipe Editor, adjust positions, then
//   File → Export as GLTF/GLB. To import: drag the HTML file
//   or exported GLB into Threepipe.
// ============================================================

import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ============================================================
// DATA
// ============================================================

const ZONE_THEMES = {
  hardware:   { name: 'Vintage Hardware',           accent: 0xC4944A, floor: 0xE3D2BC, light: 0xffaa44, signBg: '#8B6914' },
  gaming:     { name: 'Gaming History',             accent: 0x6B8E23, floor: 0xD6E0C4, light: 0x88cc44, signBg: '#4A6B16' },
  cameras:    { name: 'Cameras & Photography',       accent: 0x4A7B9D, floor: 0xC6D6E0, light: 0x4488cc, signBg: '#2E5A7A' },
  fabrication:{ name: '3D Printing & Fabrication',   accent: 0x8B6914, floor: 0xDDCEBC, light: 0xff8844, signBg: '#6B4F0E' },
  ai:         { name: 'Artificial Intelligence',     accent: 0x4682B4, floor: 0xBED0DE, light: 0x4488ff, signBg: '#2E6492' },
  software:   { name: 'Software & Digital Culture',  accent: 0x7B4A8B, floor: 0xD6C6DE, light: 0xaa44cc, signBg: '#592E6B' },
};

const zones = [
  { id: 'hardware',    name: 'Vintage Hardware',           pos: [-9, 0, -6] },
  { id: 'gaming',      name: 'Gaming History',             pos: [ 0, 0, -6] },
  { id: 'cameras',     name: 'Cameras & Photography',      pos: [ 9, 0, -6] },
  { id: 'fabrication', name: '3D Printing & Fabrication',  pos: [-9, 0,  6] },
  { id: 'ai',          name: 'Artificial Intelligence',    pos: [ 0, 0,  6] },
  { id: 'software',    name: 'Software & Digital Culture', pos: [ 9, 0,  6] },
];

const artifacts = [
  // -- Zone 1: Vintage Hardware --
  { id: 1,  name: 'Commodore 64',               zone: 'hardware',    pos: [-11.2, 0, -7.2], audio: 'audio/artifact_01.mp3', visual: 'retroPC' },
  { id: 2,  name: 'Apple Macintosh 128K',       zone: 'hardware',    pos: [ -6.8, 0, -7.2], audio: 'audio/artifact_02.mp3', visual: 'retroPC' },
  { id: 3,  name: 'IBM ThinkPad 701C',          zone: 'hardware',    pos: [-11.2, 0, -4.8], audio: 'audio/artifact_03.mp3', visual: 'laptop' },
  { id: 4,  name: '5.25" Floppy Disk Drive',    zone: 'hardware',    pos: [ -6.8, 0, -4.8], audio: 'audio/artifact_04.mp3', visual: 'drive' },
  // -- Zone 2: Gaming History --
  { id: 5,  name: 'Nintendo Entertainment System', zone: 'gaming',   pos: [ -2.2, 0, -7.2], audio: 'audio/artifact_05.mp3', visual: 'console' },
  { id: 6,  name: 'Nintendo Game Boy',          zone: 'gaming',      pos: [  2.2, 0, -7.2], audio: 'audio/artifact_06.mp3', visual: 'handheld' },
  { id: 7,  name: 'Sony PlayStation',           zone: 'gaming',      pos: [ -2.2, 0, -4.8], audio: 'audio/artifact_07.mp3', visual: 'console' },
  { id: 8,  name: 'Sega Genesis',               zone: 'gaming',      pos: [  2.2, 0, -4.8], audio: 'audio/artifact_08.mp3', visual: 'console' },
  // -- Zone 3: Cameras & Photography --
  { id: 9,  name: 'Polaroid OneStep',           zone: 'cameras',     pos: [  6.8, 0, -7.2], audio: 'audio/artifact_09.mp3', visual: 'camera' },
  { id: 10, name: 'Canon EOS 5D Mark III',      zone: 'cameras',     pos: [ 11.2, 0, -7.2], audio: 'audio/artifact_10.mp3', visual: 'camera' },
  { id: 11, name: 'Kodak Brownie',              zone: 'cameras',     pos: [  6.8, 0, -4.8], audio: 'audio/artifact_11.mp3', visual: 'camera' },
  { id: 12, name: 'GoPro Hero',                 zone: 'cameras',     pos: [ 11.2, 0, -4.8], audio: 'audio/artifact_12.mp3', visual: 'camera' },
  // -- Zone 4: 3D Printing & Fabrication --
  { id: 13, name: 'MakerBot Replicator',        zone: 'fabrication', pos: [-11.2, 0,  4.8], audio: 'audio/artifact_13.mp3', visual: 'printer' },
  { id: 14, name: 'PLA Filament Spool',         zone: 'fabrication', pos: [ -6.8, 0,  4.8], audio: 'audio/artifact_14.mp3', visual: 'spool' },
  { id: 15, name: 'Formlabs Form 3',            zone: 'fabrication', pos: [-11.2, 0,  7.2], audio: 'audio/artifact_15.mp3', visual: 'printer' },
  { id: 16, name: 'Desktop CNC Mill',           zone: 'fabrication', pos: [ -6.8, 0,  7.2], audio: 'audio/artifact_16.mp3', visual: 'cnc' },
  // -- Zone 5: Artificial Intelligence --
  { id: 17, name: 'Amazon Echo Dot',            zone: 'ai',          pos: [ -2.2, 0,  4.8], audio: 'audio/artifact_17.mp3', visual: 'speaker' },
  { id: 18, name: 'Google Nest Hub',            zone: 'ai',          pos: [  2.2, 0,  4.8], audio: 'audio/artifact_18.mp3', visual: 'speaker' },
  { id: 19, name: 'Roomba 980',                 zone: 'ai',          pos: [ -2.2, 0,  7.2], audio: 'audio/artifact_19.mp3', visual: 'robot' },
  { id: 20, name: 'Google TPU v4 Chip',         zone: 'ai',          pos: [  2.2, 0,  7.2], audio: 'audio/artifact_20.mp3', visual: 'chip' },
  // -- Zone 6: Software & Digital Culture --
  { id: 21, name: '3.5" Floppy Disk',           zone: 'software',    pos: [  6.8, 0,  4.8], audio: 'audio/artifact_21.mp3', visual: 'floppy' },
  { id: 22, name: 'CD-ROM (700MB)',             zone: 'software',    pos: [ 11.2, 0,  4.8], audio: 'audio/artifact_22.mp3', visual: 'cdrom' },
  { id: 23, name: 'Windows 95 Retail Box',      zone: 'software',    pos: [  6.8, 0,  7.2], audio: 'audio/artifact_23.mp3', visual: 'softwareBox' },
  { id: 24, name: 'Apple iMac G3',              zone: 'software',    pos: [ 11.2, 0,  7.2], audio: 'audio/artifact_24.mp3', visual: 'retroPC' },
];

// ============================================================
// SCENE SETUP
// ============================================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0xE8E0D8, 0.007);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.7, 9);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// --- Controls ---
const controls = new PointerLockControls(camera, renderer.domElement);

// ============================================================
// LIGHTING
// ============================================================

const ambientLight = new THREE.AmbientLight(0x404060, 0.45);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0xE8E0D8, 0.6);
scene.add(hemiLight);

const sunLight = new THREE.DirectionalLight(0xFFEECC, 0.8);
sunLight.position.set(0, 12, -18);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 40;
sunLight.shadow.camera.left = -20;
sunLight.shadow.camera.right = 20;
sunLight.shadow.camera.top = 20;
sunLight.shadow.camera.bottom = -20;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0xCCDDFF, 0.3);
fillLight.position.set(-10, 6, 10);
scene.add(fillLight);

// Zone point lights (built in createZone)
const zoneLights = [];

// ============================================================
// ENVIRONMENT
// ============================================================

const WALL_COLOR = 0xF5F0EB;
const TRIM_COLOR = 0xD4C9B8;
const CEILING_COLOR = 0xF0EDE8;
const ROOM_W = 32;
const ROOM_D = 24;
const ROOM_H = 5;
const HALF_W = ROOM_W / 2;
const HALF_D = ROOM_D / 2;

const wallBoxes = [];

function makeMat(color, opts = {}) {
  return new THREE.MeshStandardMaterial({ color, roughness: 0.85, metalness: 0, ...opts });
}

function addWall(x, y, z, w, h, d, color = WALL_COLOR, opts = {}) {
  const mat = makeMat(color, opts);
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  const hw = w / 2, hh = h / 2, hd = d / 2;
  wallBoxes.push({ min: [x - hw, y - hh, z - hd], max: [x + hw, y + hh, z + hd] });
  return mesh;
}

function addFloorTile(x, z, w, d, color, yOff = 0) {
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.15 });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 0.05, d), mat);
  mesh.position.set(x, 0.025 + yOff, z);
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// --- Floor ---
const floorTexCanvas = document.createElement('canvas');
floorTexCanvas.width = 512;
floorTexCanvas.height = 512;
const fctx = floorTexCanvas.getContext('2d');
fctx.fillStyle = '#E8E0D8';
fctx.fillRect(0, 0, 512, 512);
for (let i = 0; i < 40; i++) {
  fctx.strokeStyle = `rgba(210,200,190,${0.05 + Math.random() * 0.1})`;
  fctx.lineWidth = 0.5 + Math.random();
  fctx.beginPath();
  const sx = Math.random() * 512, sy = Math.random() * 512;
  fctx.moveTo(sx, sy);
  fctx.bezierCurveTo(sx + (Math.random() - 0.5) * 60, sy + (Math.random() - 0.5) * 60,
    sx + (Math.random() - 0.5) * 60, sy + (Math.random() - 0.5) * 60,
    sx + (Math.random() - 0.5) * 60, sy + (Math.random() - 0.5) * 60);
  fctx.stroke();
}
fctx.strokeStyle = 'rgba(200,195,190,0.25)';
fctx.lineWidth = 1;
for (let i = 0; i <= 512; i += 64) {
  fctx.beginPath(); fctx.moveTo(i, 0); fctx.lineTo(i, 512); fctx.stroke();
  fctx.beginPath(); fctx.moveTo(0, i); fctx.lineTo(512, i); fctx.stroke();
}
const floorTex = new THREE.CanvasTexture(floorTexCanvas);
floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(ROOM_W / 4, ROOM_D / 4);
const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.3, metalness: 0.2 });
const floor = new THREE.Mesh(new THREE.BoxGeometry(ROOM_W, 0.08, ROOM_D), floorMat);
floor.position.set(0, -0.04, 0);
floor.receiveShadow = true;
scene.add(floor);

// --- Ceiling ---
const ceilMat = makeMat(CEILING_COLOR, { roughness: 0.9, metalness: 0 });
const ceiling = new THREE.Mesh(new THREE.BoxGeometry(ROOM_W, 0.08, ROOM_D), ceilMat);
ceiling.position.set(0, ROOM_H, 0);
scene.add(ceiling);

// --- Recessed ceiling lights ---
function addCeilingLight(px, pz, color = 0xFFFFF0) {
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffffff, emissive: color, emissiveIntensity: 1.0, roughness: 0.4
  });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.04, 0.7), mat);
  mesh.position.set(px, ROOM_H - 0.04, pz);
  scene.add(mesh);
  return mesh;
}
const lightGrid = [
  [-11, -8], [-7, -8], [-4, -6], [0, -6], [4, -6], [7, -8], [11, -8],
  [-11, 0], [-7, 0], [-4, 0], [0, 0], [4, 0], [7, 0], [11, 0],
  [-11, 8], [-7, 8], [-4, 6], [0, 6], [4, 6], [7, 8], [11, 8]
];
lightGrid.forEach(([px, pz]) => addCeilingLight(px, pz));

// --- Walls ---
// North wall (z = -HALF_D) with 3 windows
const winY0 = 0.8, winY1 = 3.8; // window bottom / top
const winW = 4, winH = 3;
const winPos = [-5, 0, 5]; // center x of each window

// Below windows
addWall(0, winY0 / 2, -HALF_D, ROOM_W, winY0, 0.3);
// Above windows
addWall(0, (ROOM_H + winY1) / 2, -HALF_D, ROOM_W, ROOM_H - winY1, 0.3);
// Segments between windows (win1 ends at -3, win2 starts at -2; win2 ends at 2, win3 starts at 3)
addWall(-2.5, ROOM_H / 2, -HALF_D, 1, ROOM_H, 0.3);
addWall( 2.5, ROOM_H / 2, -HALF_D, 1, ROOM_H, 0.3);
// Left wing: x=-16 to -7, Right wing: x=7 to 16
addWall(-11.5, ROOM_H / 2, -HALF_D, 9, ROOM_H, 0.3);
addWall( 11.5, ROOM_H / 2, -HALF_D, 9, ROOM_H, 0.3);

// South wall (z = HALF_D) with entrance opening
addWall(-(HALF_W + 1.5) / 2, ROOM_H / 2, HALF_D, HALF_W - 1.5, ROOM_H, 0.3);
addWall( (HALF_W + 1.5) / 2, ROOM_H / 2, HALF_D, HALF_W - 1.5, ROOM_H, 0.3);

// East and West walls
addWall(HALF_W, ROOM_H / 2, 0, 0.3, ROOM_H, ROOM_D);
addWall(-HALF_W, ROOM_H / 2, 0, 0.3, ROOM_H, ROOM_D);

// --- Baseboards & Crown Molding ---
function addTrim(x, y, z, w, h, d, color = TRIM_COLOR) {
  const mat = makeMat(color);
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, y, z);
  scene.add(mesh);
}
const tY = 0.075;
const cY = ROOM_H - 0.05;
// North wall - on solid segments only (skip windows)
[
  [-11.5, 9],  // left wing
  [-2.5, 1],   // between win1&2
  [ 2.5, 1],   // between win2&3
  [ 11.5, 9],  // right wing
].forEach(([cx, cw]) => {
  addTrim(cx, tY, -HALF_D, cw, 0.15, 0.35);
  addTrim(cx, cY, -HALF_D, cw, 0.1, 0.35);
});
// South wall - left and right of entrance
[[-8.75, 14.5], [8.75, 14.5]].forEach(([cx, cw]) => {
  addTrim(cx, tY, HALF_D, cw, 0.15, 0.35);
  addTrim(cx, cY, HALF_D, cw, 0.1, 0.35);
});
// East and West walls
addTrim(HALF_W, tY, 0, 0.35, 0.15, ROOM_D);
addTrim(HALF_W, cY, 0, 0.35, 0.1, ROOM_D);
addTrim(-HALF_W, tY, 0, 0.35, 0.15, ROOM_D);
addTrim(-HALF_W, cY, 0, 0.35, 0.1, ROOM_D);

// --- Windows (glass) ---
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xCCDDFF, transparent: true, opacity: 0.25, roughness: 0.05, metalness: 0.0, envMapIntensity: 0.5
});
winPos.forEach(cx => {
  const glass = new THREE.Mesh(new THREE.PlaneGeometry(winW, winH), glassMat);
  glass.position.set(cx, (winY0 + winY1) / 2, -HALF_D + 0.02);
  scene.add(glass);
  // Window frames (thin border)
  const frameMat = makeMat(0xE8DFD0);
  [
    [cx, winY0, -HALF_D, winW, 0.04, 0.1],
    [cx, winY1, -HALF_D, winW, 0.04, 0.1],
    [cx - winW / 2, (winY0 + winY1) / 2, -HALF_D, 0.04, winH, 0.1],
    [cx + winW / 2, (winY0 + winY1) / 2, -HALF_D, 0.04, winH, 0.1],
  ].forEach(([fx, fy, fz, fw, fh, fd]) => {
    const frame = new THREE.Mesh(new THREE.BoxGeometry(fw, fh, fd), frameMat);
    frame.position.set(fx, fy, fz);
    scene.add(frame);
  });
});

// --- Outdoor scene (behind windows) ---
const groundOut = new THREE.Mesh(
  new THREE.PlaneGeometry(ROOM_W + 10, 20),
  new THREE.MeshStandardMaterial({ color: 0x5D8233, roughness: 0.95 })
);
groundOut.rotation.x = -Math.PI / 2;
groundOut.position.set(0, -0.04, -HALF_D - 10);
scene.add(groundOut);

function createTree(tx, tz) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 1.8, 6),
    new THREE.MeshStandardMaterial({ color: 0x6B4226, roughness: 0.9 }));
  trunk.position.y = 0.9;
  g.add(trunk);
  const c1 = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.0, 6),
    new THREE.MeshStandardMaterial({ color: 0x3D7A3D, roughness: 0.8 }));
  c1.position.y = 1.5;
  g.add(c1);
  const c2 = new THREE.Mesh(new THREE.ConeGeometry(0.7, 0.8, 6),
    new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.8 }));
  c2.position.y = 2.2;
  g.add(c2);
  g.position.set(tx, 0, tz);
  return g;
}
[-8, -4, -1, 2, 5, 8].forEach((tx, i) => {
  const tree = createTree(tx, -HALF_D - 4 - i * 2);
  scene.add(tree);
});

// ============================================================
// ZONES
// ============================================================

zones.forEach(zone => {
  const t = ZONE_THEMES[zone.id];
  const [zx, zy, zz] = zone.pos;

  // Zone floor platform (slightly raised)
  addFloorTile(zx, zz, 7, 5, t.floor, 0.02);

  // Accent wall behind zone (on north or south museum wall)
  const isNorth = zz < 0;
  const wallZ = isNorth ? -HALF_D : HALF_D;
  const awMat = makeMat(t.accent, { roughness: 0.7 });
  const aw = new THREE.Mesh(new THREE.BoxGeometry(7, 3.5, 0.05), awMat);
  aw.position.set(zx, 1.75, wallZ + (isNorth ? 0.16 : -0.16));
  scene.add(aw);

  // Zone point light
  const pl = new THREE.PointLight(t.light, 0.3, 6);
  pl.position.set(zx, 2.8, zz);
  scene.add(pl);
  zoneLights.push(pl);

  // Zone floating sign (sprite)
  const sCanvas = document.createElement('canvas');
  sCanvas.width = 512; sCanvas.height = 128;
  const sctx = sCanvas.getContext('2d');
  sctx.fillStyle = t.signBg;
  sctx.fillRect(0, 0, 512, 128);
  sctx.fillStyle = 'rgba(255,255,255,0.1)';
  sctx.fillRect(8, 8, 496, 112);
  sctx.fillStyle = '#ffffff';
  sctx.font = 'bold 42px "Segoe UI", Arial, sans-serif';
  sctx.textAlign = 'center';
  sctx.textBaseline = 'middle';
  sctx.shadowColor = 'rgba(0,0,0,0.5)';
  sctx.shadowBlur = 8;
  sctx.fillText(t.name, 256, 64);
  const sTex = new THREE.CanvasTexture(sCanvas);
  const sMat = new THREE.SpriteMaterial({ map: sTex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(sMat);
  sprite.scale.set(3.5, 0.88, 1);
  sprite.position.set(zx, 3.2, zz);
  sprite.name = `zone_${zone.id}`;
  scene.add(sprite);
});

// ============================================================
// ARTIFACT MODELS
// ============================================================

function pedHeight(type) {
  const h = { floppy:0.5, chip:0.5, handheld:0.6, camera:0.6, cdrom:0.6,
    retroPC:0.8, console:0.8, speaker:0.8, drive:0.8, softwareBox:0.8,
    laptop:0.9, printer:1.0, robot:1.0, spool:1.0, cnc:1.0 };
  return h[type] || 0.8;
}

function makePedestal(height) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.28, 0.33, height, 10),
    new THREE.MeshStandardMaterial({ color: 0xCCCCCC, roughness: 0.5, metalness: 0.1 })
  );
  body.position.y = height / 2;
  g.add(body);
  const top = new THREE.Mesh(

(function createArrows() {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0.35); shape.lineTo(-0.18, -0.15);
  shape.lineTo(-0.04, -0.05); shape.lineTo(0.04, -0.05);
  shape.lineTo(0.18, -0.15); shape.closePath();
  const arrowMat = new THREE.MeshStandardMaterial({
    color: 0xFFD700, transparent: true, opacity: 0.35, side: THREE.DoubleSide, roughness: 0.5
  });
  // arrow tip after rot.x=-PI/2 points in -Z; rot.z rotates around world Y axis
  // rot=0 → -Z, rot=PI/2 → -X, rot=-PI/2 → +X, rot=PI → +Z
  const pathPoints = [
    { pos: [-5, 0.02,  3], rot:  Math.PI/2 },  // entrance → hardware (-X)
    { pos: [-6, 0.02, -4], rot: -Math.PI/2 },  // hardware → gaming (+X)
    { pos: [ 4, 0.02, -4], rot: -Math.PI/2 },  // gaming → cameras (+X)
    { pos: [ 9, 0.02,  0], rot:  Math.PI },    // cameras → software (+Z)
    { pos: [ 4, 0.02,  4], rot:  Math.PI/2 },  // software → AI (-X)
    { pos: [-4, 0.02,  4], rot:  Math.PI/2 },  // AI → fabrication (-X)
    { pos: [-4, 0.02,  0], rot:  0 },          // fabrication → center (-Z)
  ];
  pathPoints.forEach(p => {
    const mesh = new THREE.Mesh(new THREE.ShapeGeometry(shape), arrowMat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.rotation.z = p.rot;
    mesh.position.set(p.pos[0], 0.03, p.pos[2]);
    scene.add(mesh);
  });
})();

// AUDIO SYSTEM

const listener = new THREE.AudioListener();
camera.add(listener);

const audioLoader = new THREE.AudioLoader();
const currentAudio = new THREE.Audio(listener);
currentAudio.addEventListener('ended', () => {
  isPlaying = false;
  currentlyPlayingName = '';
  document.getElementById('playing').classList.remove('visible');
});
let isPlaying = false;
let currentlyPlayingName = '';
let nearestTrigger = null;

function playArtifactAudio(artifact) {
  if (isPlaying) {
    currentAudio.stop();
    isPlaying = false;
    document.getElementById('playing').classList.remove('visible');
    currentlyPlayingName = '';
    if (nearestTrigger && nearestTrigger.name === artifact.name) {
      return;
    }
  }
  audioLoader.load(artifact.audio, (buffer) => {
    currentAudio.setBuffer(buffer);
    currentAudio.play();
    isPlaying = true;
    currentlyPlayingName = artifact.name;
    const el = document.getElementById('playing');
    el.textContent = 'Now playing: ' + artifact.name;
    el.classList.add('visible');
  }, undefined, (err) => {
    console.warn('Audio load failed:', artifact.audio, err);
    document.getElementById('playing').textContent = 'Audio unavailable';
    document.getElementById('playing').classList.add('visible');
    setTimeout(() => document.getElementById('playing').classList.remove('visible'), 2000);
  });
}

// CONTROLS & INPUT
// ============================================================

const moveState = { fwd: 0, right: 0 };
const SPEED = 3.0;
const PLAYER_RADIUS = 0.3;
const PLAYER_HEIGHT = 1.7;

document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyW': moveState.fwd = 1; e.preventDefault(); break;
    case 'KeyS': moveState.fwd = -1; e.preventDefault(); break;
    case 'KeyA': moveState.right = -1; e.preventDefault(); break;
    case 'KeyD': moveState.right = 1; e.preventDefault(); break;
    case 'KeyE':
      if (nearestTrigger) {
        playArtifactAudio(nearestTrigger);
      }
      break;
    case 'KeyP':
      const p = camera.position;
      console.log(`Player position: [${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)}]`);
      document.getElementById('debug').textContent =
        `Pos: ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
      break;
  }
});
document.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': case 'KeyS': moveState.fwd = 0; break;
    case 'KeyA': case 'KeyD': moveState.right = 0; break;
  }
});

function checkCollision(pos) {
  const r = PLAYER_RADIUS;
  const feetY = pos.y - PLAYER_HEIGHT;
  const headY = pos.y;
  for (const box of wallBoxes) {
    if (pos.x + r > box.min[0] && pos.x - r < box.max[0] &&
        headY > box.min[1] && feetY < box.max[1] &&
        pos.z + r > box.min[2] && pos.z - r < box.max[2]) {
      return true;
    }
  }
  return false;
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);

  // Movement
  if (controls.isLocked) {
    const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
    fwd.y = 0; fwd.normalize();
    right.y = 0; right.normalize();

    const move = new THREE.Vector3();
    move.addScaledVector(fwd, moveState.fwd);
    move.addScaledVector(right, moveState.right);
    if (move.lengthSq() > 0) {
      move.normalize().multiplyScalar(SPEED * dt);
      const newPos = camera.position.clone().add(move);
      if (!checkCollision(newPos)) {
        camera.position.copy(newPos);
      } else {
        // Try sliding along each axis
        const tryX = new THREE.Vector3(newPos.x, camera.position.y, camera.position.z);
        if (!checkCollision(tryX)) camera.position.x = newPos.x;
        const tryZ = new THREE.Vector3(camera.position.x, camera.position.y, newPos.z);
        if (!checkCollision(tryZ)) camera.position.z = newPos.z;
      }
    }
  }

  // Audio trigger proximity check
  nearestTrigger = null;
  let minDist = Infinity;
  const camPos = camera.position;
  for (const t of audioTriggers) {
    const dist = camPos.distanceTo(t.pos);
    if (dist < 2.0 && dist < minDist) {
      minDist = dist;
      nearestTrigger = t;
    }
  }

  const promptEl = document.getElementById('prompt');
  if (nearestTrigger && !isPlaying) {
    promptEl.textContent = nearestTrigger.name + ' \u2014 Press E to listen';
    promptEl.classList.add('visible');
  } else if (nearestTrigger && isPlaying && currentlyPlayingName !== nearestTrigger.name) {
    promptEl.textContent = nearestTrigger.name + ' \u2014 Press E to listen';
    promptEl.classList.add('visible');
  } else {
    promptEl.classList.remove('visible');
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
